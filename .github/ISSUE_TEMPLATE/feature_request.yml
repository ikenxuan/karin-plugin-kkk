name: 🚀 功能建议
description: 提议有明确场景、受益范围和可验收结果的新能力或改进
title: 'Feature: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        ## 先说明问题，再提出方案

        功能建议应回答：**谁在什么场景遇到了什么限制、现有方案为什么不够、期望最终得到什么结果**。单纯填写“支持一下”“加个开关”“能不能做……”通常不足以进入需求评审。

        > 强烈推荐阅读 [《提问的智慧》](https://github.com/ryanhanwu/How-To-Ask-Questions-The-Smart-Way)、[《如何向开源社区提问题》](https://github.com/seajs/seajs/issues/545)、[《如何有效地报告 Bug》](http://www.chiark.greenend.org.uk/%7Esgtatham/bugs-cn.html) 和 [《如何向开源项目提交无法解答的问题》](https://zhuanlan.zhihu.com/p/25795393)。清楚的问题定义和使用场景，比直接指定实现方式更有助于评估需求。

        > [!IMPORTANT]
        > 个人配置求助、安装咨询和一次性需求请前往 [Discussions](https://github.com/ikenxuan/karin-plugin-kkk/discussions)。上游平台或接口本身不支持的能力，也请先提供可行性依据。

  - type: checkboxes
    id: preflight
    attributes:
      label: 提交前确认
      description: 请确认该建议值得进入公开需求池。
      options:
        - label: '我已查阅项目文档，并搜索现有 Issues 和 Discussions，确认没有相同建议 <!-- kkk-issue-form: feature-v2 -->'
          required: true
        - label: 这不是仅针对我个人环境的配置、安装或排障请求
          required: true
        - label: 我会描述实际问题和受益场景，而不只是指定“加开关”或“支持某功能”
          required: true
        - label: 我理解提交建议不代表项目承诺实现，最终优先级由维护者评估
          required: true

  - type: dropdown
    id: feature-type
    attributes:
      label: 建议类型
      options:
        - 新平台或新内容类型支持
        - 解析或消息发送能力
        - 动态推送能力
        - WebUI 或配置体验
        - 性能、稳定性或资源占用
        - 安装、部署或更新体验
        - 开发者接口或扩展能力
        - 其他
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 涉及平台
      options:
        - 通用或不确定
        - 抖音
        - B站
        - 快手
        - 小红书
        - 新平台
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 需求背景
      description: 描述当前遇到的真实问题：谁会遇到、多久发生一次、造成了什么影响。不要在这里直接写解决方案。
      placeholder: |
        例如：多个群需要不同的解析内容，但当前配置只能全局生效，导致……
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 功能建议
      description: 描述期望的交互流程、输入和输出，以及明确不需要覆盖的边界；不要求给出代码实现。
      placeholder: |
        例如：允许为指定群覆盖 sendContent；未配置群继续继承全局值；暂不要求支持……
    validations:
      required: true

  - type: textarea
    id: use-cases
    attributes:
      label: 使用场景
      description: 至少给出一个可用于验收的具体场景，说明操作步骤和期望结果。
      placeholder: |
        场景一：……
        1. 用户或管理员……
        2. 插件……
        3. 最终……
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 现有方案与不足
      description: 说明你当前如何解决，以及为什么文档、已有配置、脚本或其他插件不能满足需求。
      placeholder: 如果没有可行替代方案，请说明已尝试或检索过什么，以及受阻原因。
    validations:
      required: true

  - type: dropdown
    id: affected-users
    attributes:
      label: 预期受益范围
      description: 这不是优先级投票，而是帮助维护者判断需求是否具有通用性。
      options:
        - 大多数用户都可能受益
        - 使用该平台或模块的用户会受益
        - 某类部署或适配器用户会受益
        - 目前仅确认我自己的场景
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: 兼容性与风险
      description: 如果已知，请说明可能涉及的上游限制、兼容性、性能、安全或迁移成本。
      placeholder: 可选；不知道可以留空，不要猜测。
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: 补充材料
      description: 可提供上游文档、接口依据、原型、示例链接，或说明是否愿意参与实现和测试。
      placeholder: 可选；请勿包含 Cookie、Token、账号等敏感信息。
    validations:
      required: false
