name: Build NPM Lib

on:
  workflow_call:
    inputs:
      watermark_tag_name:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      watermark_tag_name:
        description: 'watermark release tag（手动运行可选）'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  build-watermark-binaries:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            label: win32-x64-msvc
          - runner: macos-latest
            target: aarch64-apple-darwin
            label: darwin-arm64
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x64-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            label: linux-arm64-gnu

    steps:
      - name: 📥 检出源代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 🔨 构建目标二进制
        id: build
        uses: puniyu/napi-build-action@main
        with:
          target: ${{ matrix.target }}
          cwdDir: packages/watermark

      - name: 📤 上传二进制产物
        uses: actions/upload-artifact@v4
        with:
          name: watermark-node-${{ matrix.label }}
          path: ${{ steps.build.outputs.output-path }}
          if-no-files-found: error

  publish-watermark:
    runs-on: ubuntu-latest
    needs: [build-watermark-binaries]
    permissions:
      contents: write
      id-token: write
    steps:
      - name: 📥 检出源代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 📦 配置 PNPM 环境
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
          registry-url: 'https://registry.npmjs.org'

      - name: ⏫ 升级 npm 版本
        run: npm install -g npm@latest

      - name: 📥 下载 watermark 二进制产物
        uses: actions/download-artifact@v4
        with:
          pattern: watermark-node-*
          path: packages/watermark/artifacts
          merge-multiple: true

      - name: 📦 安装依赖
        working-directory: packages/watermark
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: 🚀 发布 watermark 平台子包与主包
        working-directory: packages/watermark
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm config set provenance true
          pnpm config set registry https://registry.npmjs.org/
          echo "//registry.npmjs.org/:_authToken=$NODE_AUTH_TOKEN" >> ~/.npmrc

          pnpm run create-npm-dirs
          pnpm run artifacts

          find npm -mindepth 1 -maxdepth 1 -type d | sort | while read -r pkgDir; do
            if [ -f "$pkgDir/package.json" ]; then
              (cd "$pkgDir" && pnpm publish --access public --no-git-checks --provenance)
            fi
          done

          pnpm publish --access public --no-git-checks --provenance

      - name: 📤 上传 watermark Release 附件
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/watermark/artifacts/*.node
          tag_name: ${{ inputs.watermark_tag_name != '' && inputs.watermark_tag_name || github.ref_name }}
