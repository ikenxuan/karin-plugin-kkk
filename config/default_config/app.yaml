# 默认解析，即识别最高优先级，修改后重启生效
videoTool: true

# 自定义优先级，「默认解析」关闭后才会生效。修改后重启生效
priority: 800

# 缓存删除，非必要不修改！
removeCache: true

# 渲染精度，可选值50~200，建议100。设置高精度会提高图片的精细度，过高可能会影响渲染与发送速度
renderScale: 100

# 放出API服务（本地部署一个抖音、B站和快手的api服务）
APIServer: false

# API服务端口
APIServerPort: 4567

# API 服务是否挂载到 Karin 上，开启后监听端口为 Karin 的 http 端口，修改后需重启
APIServerMount: true

# 渲染评论图和推送图的主题色，0为自动（06:00-18:00为浅色，18:00-06:00为深色），1为浅色，2为深色
Theme: 0

# 渲染的图片是否移除底部水印
RemoveWatermark: false

# 渲染图片的等待时间，单位：秒。传递 0 可禁用等待（Linux系统必须大于0）
RenderWaitTime: 60

# 表情回应，若适配器或对应平台不支持需要关闭
EmojiReply: true

# 解析提示，发送提示信息："检测到xxx链接，开始解析"
parseTip: false

# 是否伪造合并转发消息，开启后使用触发者身份展示转发
fakeForward: false

# 遇到错误时谁会收到错误日志？可选值：'master'（除'console'外的第一个主人）、'allMasters'（所有主人，排除console）、'trigger'（触发者）
errorLogSendTo: 
  - master

# 分页渲染，将模板渲染成多页的图片，以降低渲染器压力，默认开启，非必要不修改
multiPageRender: true

# 分页渲染时，每页的高度，经测试最佳每页高度为12000px，默认12000px
multiPageHeight: 12000

# 当解析到作品/动态包含 Live Photo 时，合并转发消息里发送的 Live Photo 静态图兼容系统
# 可选值：
#   'google' - Google Motion Photo 格式
#   'xiaomi' - 小米实况照片格式，兼容小米（支持实况照片的任何版本）和 Google，但无法被 OPPO 识别
#   'oppo' - OPPO 实况照片格式（推荐），兼容 OPPO、小米（较新版本）和 Google，兼容性最广
#   'huawei_honor' - 华为/荣耀实况照片格式（理论可行但未实测，作者无对应设备）
# 注：vivo（Origin OS）和 iPhone（iOS）需要独立的图片和同名视频文件，暂不支持
livePhotoSystem: oppo

# 解析遇到实况图时的处理和发送方式
# 可选值：'video_and_livephoto'（生成并发送仿 iPhone Live Photo 播放效果的视频（播放三次，性能开销大，2C2G 服务器约 20s/张）+ 对应系统的实况图）、'video_only'（仅生成并发送仿 iPhone Live Photo 播放效果的视频（播放三次，性能开销大，2C2G 服务器约 20s/张））、'livephoto_only'（仅生成并发送对应系统的实况图）
livePhotoMode: video_and_livephoto

# 扫码登录时使用的地址类型，可选值：'lan'（局域网IP）、'external'（外部地址）
qrLoginAddrType: lan

# 外部访问地址（当 qrLoginAddrType 为 'external' 时使用，可以是公网IP或域名）
qrLoginExternalAddr: ''
