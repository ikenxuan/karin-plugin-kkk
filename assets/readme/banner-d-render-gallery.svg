<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc" font-family="'Microsoft YaHei UI', 'Microsoft YaHei', 'Segoe UI', 'PingFang SC', 'Noto Sans CJK SC', 'Source Han Sans SC', Arial, sans-serif">
  <title id="title">karin-plugin-kkk 渲染成果画廊</title>
  <desc id="desc">以视频详情、动态推送、评论与统计海报组成的成果墙，展示插件的多样化渲染能力。</desc>
  <defs>
    <style>
      .theme-canvas {
        fill: #ffffff;
      }

      .theme-primary {
        fill: #18161A;
      }

      .theme-muted {
        fill: #746D78;
      }

      .theme-subtle {
        fill: #877E8B;
      }

      .interaction-feedback {
        pointer-events: none;
      }

      @media (prefers-color-scheme: dark) {
        .theme-canvas {
          fill: #0d1117;
        }

        .theme-primary {
          fill: #F7F4F8;
        }

        .theme-muted {
          fill: #BDB5C1;
        }

        .theme-subtle {
          fill: #978E9B;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .interaction-feedback {
          display: none;
        }
      }
    </style>
