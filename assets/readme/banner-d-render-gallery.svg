      <path d="m12.66 2.18 162.19 162.13c4.63 4.63 2.56 13.93-3.99 13.93h-49.23c-9.4 0-18.41-6.33-25.06-12.97L12.97 81.66C6.32 75.01 0 66 0 56.6V7.38C0 .83 8.03-2.45 12.66 2.18Z" />
    </symbol>
  </defs>

  <rect class="theme-canvas" width="1200" height="420" fill="#F8F6F9" />
